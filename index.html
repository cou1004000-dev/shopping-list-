<!doctype html><html lang="ko"><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#fff7e8"><title>살 것들</title><style>
:root{--bg:#fff7e8;--card:#fff;--txt:#332822;--mut:#8b7b72;--line:#f1ded2;--a:#ff6b6b;--b:#7bdac8;--sh:0 8px 24px #db9b8a26}body.d{--bg:#10172a;--card:#19233b;--txt:#f8edf4;--mut:#bdc4d6;--line:#2c3958;--a:#ff7bae;--b:#72e0ca;--sh:0 8px 24px #0006}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--txt);font-family:system-ui,-apple-system,Segoe UI,sans-serif}button,input{font:inherit;color:inherit}button{min-height:44px;border:0;border-radius:14px;background:var(--card);box-shadow:var(--sh);cursor:pointer}#app,.gate{max-width:480px;min-height:100dvh;margin:auto;padding:14px 14px 96px}.gate{display:grid;place-items:center}.box{width:100%;display:grid;gap:10px;background:var(--card);border:1px solid var(--line);border-radius:8px;padding:18px;box-shadow:var(--sh)}.box h1{margin:0;font-size:28px}.box p{margin:0 0 8px;color:var(--mut);line-height:1.5}header{position:sticky;top:0;z-index:3;background:linear-gradient(var(--bg) 78%,#0000);padding:8px 0 12px}.head{display:flex;align-items:center;gap:8px}.head h1{font-size:24px;margin:0 auto 0 0}.ico{width:44px;padding:0}.tabs{display:flex;gap:8px;overflow:auto;padding:4px 0 10px;scrollbar-width:none}.tabs button{white-space:nowrap;padding:0 14px;color:var(--mut);box-shadow:none;border:1px solid var(--line)}button.on,.tabs .on{background:var(--a);color:white;border-color:var(--a)}main{display:grid;gap:10px}.empty{text-align:center;color:var(--mut);padding:46px 12px;line-height:1.6}.card,.mini{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--line);border-radius:8px;padding:10px;box-shadow:var(--sh)}.done{opacity:.48}.done b{text-decoration:line-through}.chk{width:44px;border-radius:50%;box-shadow:none;border:2px solid var(--b);background:#0000;color:var(--a);font-weight:900}.info{min-width:0;flex:1}.top{display:flex;align-items:center;gap:6px;min-width:0}.top b{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.info p{margin:4px 0 0;color:var(--mut);font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.badge{font-size:12px;border-radius:12px;padding:3px 8px;white-space:nowrap;color:#51433d}.bfood{background:#d9f6cf}.blife{background:#d8edff}.bstationery{background:#fff1a8}.bhealth{background:#ffd9e4}.betc{background:#eadcff}.star.on{background:#fff1a8}nav{position:fixed;left:50%;bottom:0;transform:translateX(-50%);z-index:6;width:min(100%,480px);display:grid;grid-template-columns:repeat(4,1fr);gap:6px;padding:8px 10px calc(8px + env(safe-area-inset-bottom));background:color-mix(in srgb,var(--bg) 88%,#fff);border-top:1px solid var(--line)}nav button{box-shadow:none;border-radius:8px;font-size:13px;color:var(--mut)}#fab{position:fixed;z-index:7;left:calc(50% + 174px);bottom:86px;width:58px;height:58px;border-radius:50%;font-size:32px;background:var(--a);color:white}.shade{position:fixed;inset:0;z-index:8;background:#0007;opacity:0;pointer-events:none;transition:.18s opacity}.shade.show{opacity:1;pointer-events:auto}.sheet{position:fixed;left:50%;bottom:0;z-index:9;width:min(100%,480px);max-height:88dvh;overflow:auto;transform:translate(-50%,105%);transition:.24s transform;background:var(--bg);border-radius:18px 18px 0 0;padding:14px;box-shadow:0 -14px 40px #0004}.sheet.show{transform:translate(-50%,0)}form{display:grid;gap:10px}.row{display:flex;gap:8px}.row>*{flex:1}input{width:100%;min-height:44px;border:1px solid var(--line);border-radius:12px;background:var(--card);padding:0 12px}.qty{display:flex;align-items:center;justify-content:center;gap:16px;background:var(--card);border-radius:12px}.qty b{min-width:28px;text-align:center}.pick{display:grid;grid-template-columns:repeat(5,1fr);gap:7px}.pick button{box-shadow:none;border:1px solid var(--line);padding:0;font-size:20px}.save{background:var(--a);color:white}.save:disabled{opacity:.45}.grid{display:grid;grid-template-columns:repeat(8,1fr);gap:6px;background:var(--card);border:1px solid var(--line);border-radius:8px;padding:8px}.grid button{box-shadow:none;border-radius:8px;font-size:20px;padding:0}.sec{margin:6px 0 2px;font-size:17px}.toast{position:fixed;left:50%;bottom:78px;z-index:10;transform:translate(-50%,20px);opacity:0;background:#222;color:white;border-radius:999px;padding:12px 18px;transition:.2s;max-width:92%;text-align:center}.toast.show{opacity:1;transform:translate(-50%,0)}[hidden]{display:none!important}@media(max-width:480px){#fab{left:auto;right:18px}.head h1{font-size:22px}.grid{grid-template-columns:repeat(5,1fr)}}
</style><body><section id="gate" class="gate"><div class="box"><h1>살 것들</h1><p id="gmsg">로그인 또는 가입 신청을 해주세요</p><input id="mail" type="email" autocomplete="email" placeholder="이메일"><input id="pw" type="password" autocomplete="current-password" placeholder="비밀번호"><input id="nick" maxlength="12" placeholder="이름(가입 때만)"><div class="row"><button id="login">로그인</button><button id="join" class="save">가입 신청</button></div><button id="logout" hidden>로그아웃</button></div></section><div id="app" hidden><header><div class="head"><h1>살 것들</h1><button id="theme" class="ico" title="테마">🌙</button><button id="clear" class="ico" title="완료 삭제">🗑️</button></div><div id="cats" class="tabs"></div></header><main id="view"><p class="empty">불러오는 중...</p></main></div><nav id="nav" hidden></nav><button id="fab" hidden>+</button><div id="shade" class="shade"></div><section id="sheet" class="sheet"><form id="form"><div class="row"><button id="emoji" type="button" class="ico">🛒</button><input id="name" maxlength="20" placeholder="품목명"></div><div id="epick" class="grid" hidden></div><div id="cpick" class="row"></div><div class="qty"><button type="button" data-q="-1">−</button><b id="qty">1</b><button type="button" data-q="1">+</button></div><input id="memo" maxlength="60" placeholder="메모"><button id="save" class="save" disabled>등록</button></form></section><div id="toast" class="toast"></div><script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import{getAuth,onAuthStateChanged,createUserWithEmailAndPassword,signInWithEmailAndPassword,signOut}from"https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
import{getDatabase,ref,push,set,onValue,update,remove}from"https://www.gstatic.com/firebasejs/10.12.5/firebase-database.js";
// Firebase 콘솔의 웹 앱 설정값으로 교체하세요. Authentication에서 이메일/비밀번호 로그인을 켜세요.
const firebaseConfig={apiKey:"YOUR_API_KEY",authDomain:"YOUR_PROJECT.firebaseapp.com",databaseURL:"https://YOUR_PROJECT-default-rtdb.firebaseio.com",projectId:"YOUR_PROJECT",storageBucket:"YOUR_PROJECT.appspot.com",messagingSenderId:"YOUR_SENDER_ID",appId:"YOUR_APP_ID"};
const $=s=>document.querySelector(s),$$=s=>[...document.querySelectorAll(s)],C=[["all","전체"],["food","식재료"],["life","생필품"],["stationery","문구"],["health","의약"],["etc","기타"]],CN=Object.fromEntries(C),E="🛒 🍎 🍌 🍊 🍓 🍇 🍑 🍉 🥕 🥬 🥔 🥚 🥛 🍞 🍚 🍜 🧂 🧻 🧼 🧴 🪥 🧽 🧺 ✏️ 🖊️ 🖍️ 📓 📒 📎 📁 💊 🩹 😷 🧃 🍪 ☕ 🧀 🧈 🥜 🍯".split(" "),F={1:"🍊 귤|🍋 레몬|🥝 키위",2:"🍊 귤|🍋 레몬|🥝 키위",3:"🍓 딸기|🍊 천혜향",4:"🍓 딸기|🍊 천혜향",5:"🍒 체리|🫐 블루베리|🟢 매실",6:"🍒 체리|🫐 블루베리|🟢 매실",7:"🍑 복숭아|🍉 수박|🍇 포도",8:"🍑 복숭아|🍉 수박|🍇 포도",9:"🍎 사과|🍐 배|🌰 밤",10:"🍎 사과|🍐 배|🌰 밤",11:"🍊 귤|🍠 고구마|🥜 땅콩",12:"🍊 귤|🍠 고구마|🥜 땅콩"},S={필기:"✏️ 샤프 0.5mm|🖊️ 중성펜|🖍️ 형광펜 세트",노트류:"📓 줄 노트|🎨 무지 스케치북|🗒️ 포스트잇",정리:"📎 바인더 클립|📁 파일 홀더|📏 자 세트",기타:"🔖 책갈피|🧽 지우개|⬜ 수정테이프"};
let app,auth,db,user,okd=0,unI,unU,items=[],favs={},tab="home",fil="all",load=1,err="",cur={e:"🛒",c:"food",q:1},to;
if(localStorage.dark==="1")document.body.classList.add("d");
$("#cpick").innerHTML=C.slice(1).map(x=>`<button type="button" data-pick="${x[0]}">${x[1]}</button>`).join("");
$("#epick").innerHTML=E.map(e=>`<button type="button" data-emo="${e}">${e}</button>`).join("");
$("#nav").innerHTML=[["home","🏠","홈"],["fav","⭐","즐겨찾기"],["fruit","🍓","제철과일"],["school","✏️","학용품"]].map(x=>`<button data-tab="${x[0]}">${x[1]}<br>${x[2]}</button>`).join("");
const ok=!Object.values(firebaseConfig).join("").includes("YOUR_");
if(ok)try{app=initializeApp(firebaseConfig);auth=getAuth(app);db=getDatabase(app);onAuthStateChanged(auth,authing)}catch(e){gate("Firebase 설정값을 확인해주세요")}else gate("Firebase 설정값을 index.html 상단에서 교체해주세요");
function stop(){if(unI)unI(),unI=0;if(unU)unU(),unU=0;items=[];load=1;okd=0}
function gate(t,w=0){$("#gate").hidden=0;$("#app").hidden=$("#nav").hidden=$("#fab").hidden=1;$("#gmsg").textContent=t;["mail","pw","nick","login","join"].forEach(id=>$("#"+id).hidden=w);$("#logout").hidden=!w}
function enter(){favs=JSON.parse(localStorage["favs_"+user.uid]||"{}");$("#gate").hidden=1;$("#app").hidden=$("#nav").hidden=0;render()}
function authing(u){stop();user=u;if(!u)return gate("로그인 또는 가입 신청을 해주세요");unU=onValue(ref(db,"users/"+u.uid),s=>{let v=s.val();if(v&&v.a===true){okd=1;enter();if(!unI)sub()}else{if(unI)unI(),unI=0;okd=0;gate("가입 신청이 접수되었어요. 관리자 승인 후 이용할 수 있어요.",1)}},()=>gate("승인 정보를 불러오지 못했어요",1))}
function sub(){load=1;err="";render();unI=onValue(ref(db,"items/"+user.uid),s=>{items=[];s.forEach(v=>items.push({id:v.key,...v.val()}));load=0;err="";render()},()=>{load=0;err="인터넷 연결을 확인해주세요";render()})}
function P(id=""){return"items/"+user.uid+(id?"/"+id:"")}
function esc(s){return String(s||"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]))}
function k(o){return[o.c||"etc",o.n,o.e||"🛒"].join("|")}
function toast(t){clearTimeout(to);$("#toast").textContent=t;$("#toast").classList.add("show");to=setTimeout(()=>$("#toast").classList.remove("show"),1500)}
function render(){if(!okd)return;document.body.classList.toggle("d",localStorage.dark==="1");$("#theme").textContent=document.body.classList.contains("d")?"☀️":"🌙";$("#nav").querySelectorAll("button").forEach(b=>b.classList.toggle("on",b.dataset.tab===tab));$("#cats").hidden=tab!=="home";$("#clear").hidden=tab!=="home";$("#fab").hidden=tab!=="home";tab==="home"?home():tab==="fav"?fav():tab==="fruit"?fruit():school()}
function catbar(){let n=c=>items.filter(i=>!i.d&&(c==="all"||i.c===c)).length;$("#cats").innerHTML=C.map(x=>`<button data-cat="${x[0]}" class="${fil===x[0]?"on":""}">${x[1]} ${n(x[0])}</button>`).join("")}
function home(){catbar();if(err)return $("#view").innerHTML=`<p class="empty">${err}</p>`;if(load)return $("#view").innerHTML='<p class="empty">불러오는 중...</p>';let a=items.filter(i=>fil==="all"||i.c===fil).sort((a,b)=>(a.d-b.d)||(b.t-a.t));$("#view").innerHTML=a.length?a.map(card).join(""):'<p class="empty">아직 추가된 항목이 없어요 🛍️</p>'}
function card(i){let f=!!favs[k(i)],c=i.c||"etc";return`<article class="card ${i.d?"done":""}" data-id="${i.id}"><button class="chk" data-act="done">${i.d?"✓":""}</button><div class="info"><div class="top"><b title="${esc(i.n)}">${esc(i.n)}</b><span class="badge b${c}">${CN[c]||"기타"}</span></div><p>${i.e||"🛒"} ${i.q||1}개${i.m?" · "+esc(i.m):""}</p></div><button class="ico star ${f?"on":""}" data-act="fav">⭐</button><button class="ico" data-act="del">🗑️</button></article>`}
function mini(o,extra=""){return`<article class="mini"><div class="info"><div class="top"><b>${esc(o.n)}</b><span class="badge b${o.c||"food"}">${CN[o.c||"food"]}</span></div>${extra}</div><button class="ico" data-add="${esc(o.n)}" data-e="${esc(o.e)}" data-c="${o.c||"food"}">＋</button></article>`}
function fav(){let a=Object.entries(favs);$("#view").innerHTML=a.length?a.map(([x,o])=>`<article class="mini"><div class="info"><div class="top"><b>${esc(o.n)}</b><span class="badge b${o.c}">${CN[o.c]}</span></div><p>${o.e} ${o.q||1}개</p></div><button class="ico" data-fk="${esc(x)}">＋</button></article>`).join(""):'<p class="empty">자주 사는 품목을 ⭐로 저장하면 여기서 빠르게 추가할 수 있어요!</p>'}
function parts(s,c){return s.split("|").map(v=>{let p=v.indexOf(" ");return{e:v.slice(0,p),n:v.slice(p+1),c}})}
function fruit(){let m=new Date().getMonth()+1,a=parts(F[m],"food");$("#view").innerHTML=`<h2 class="sec">${m}월 제철</h2>`+a.map(o=>mini(o)).join("")}
function school(){let h="";for(let x in S)h+=`<h2 class="sec">${x}</h2>`+parts(S[x],"stationery").map(o=>mini(o)).join("");$("#view").innerHTML=h}
function openM(){cur={e:"🛒",c:"food",q:1};$("#emoji").textContent=cur.e;$("#qty").textContent=1;$("#name").value=$("#memo").value="";$("#save").disabled=1;$("#epick").hidden=1;pick();$("#shade").classList.add("show");$("#sheet").classList.add("show");setTimeout(()=>$("#name").focus(),180)}
function closeM(){$("#shade").classList.remove("show");$("#sheet").classList.remove("show")}
function pick(){$$("#cpick button").forEach(b=>b.classList.toggle("on",b.dataset.pick===cur.c))}
async function add(o){if(!okd)return toast("관리자 승인 후 이용해주세요");if(!navigator.onLine)return toast("인터넷 연결을 확인해주세요");let v={e:o.e||"🛒",n:o.n.trim().slice(0,20),c:o.c||"etc",q:Math.min(99,Math.max(1,+o.q||1)),d:false,t:Date.now()};if(o.m)v.m=o.m.trim().slice(0,60);try{await set(push(ref(db,P())),v);toast("추가되었어요! 🎉");return 1}catch(e){toast("인터넷 연결을 확인해주세요")}}
async function join(){let e=$("#mail").value.trim(),p=$("#pw").value,n=$("#nick").value.trim();if(!e||p.length<6)return gate("이메일과 6자 이상 비밀번호를 입력해주세요");try{let r=await createUserWithEmailAndPassword(auth,e,p);await set(ref(db,"users/"+r.user.uid),{e,n:n.slice(0,12),a:false,t:Date.now()});gate("가입 신청이 접수되었어요. 관리자 승인 후 이용할 수 있어요.",1)}catch(x){gate("가입 정보를 확인해주세요")}}
async function login(){let e=$("#mail").value.trim(),p=$("#pw").value;if(!e||!p)return gate("이메일과 비밀번호를 입력해주세요");try{await signInWithEmailAndPassword(auth,e,p)}catch(x){gate("로그인 정보를 확인해주세요")}}
document.addEventListener("click",async e=>{if(e.target.id==="shade")closeM();let b=e.target.closest("button");if(!b)return;if(b.id==="join")join();else if(b.id==="login")login();else if(b.id==="logout")signOut(auth);else if(b.id==="theme"){localStorage.dark=localStorage.dark==="1"?"0":"1";render()}else if(b.id==="fab")openM();else if(b.id==="clear"){let a=items.filter(i=>i.d);if(!a.length)return toast("완료 항목이 없어요");if(confirm(`완료된 항목 ${a.length}개를 삭제할까요?`)){let u={};a.forEach(i=>u[P(i.id)]=null);await update(ref(db),u);toast("삭제했어요")}}else if(b.dataset.tab){tab=b.dataset.tab;render()}else if(b.dataset.cat){fil=b.dataset.cat;render()}else if(b.dataset.pick){cur.c=b.dataset.pick;pick()}else if(b.dataset.q){cur.q=Math.min(99,Math.max(1,cur.q+ +b.dataset.q));$("#qty").textContent=cur.q}else if(b.id==="emoji")$("#epick").hidden=!$("#epick").hidden;else if(b.dataset.emo){cur.e=b.dataset.emo;$("#emoji").textContent=cur.e;$("#epick").hidden=1}else if(b.dataset.add)await add({e:b.dataset.e,n:b.dataset.add,c:b.dataset.c,q:1});else if(b.dataset.fk&&favs[b.dataset.fk])await add(favs[b.dataset.fk]);else if(b.dataset.act){let it=items.find(i=>i.id===b.closest(".card").dataset.id);if(!it)return;if(b.dataset.act==="fav"){let x=k(it);favs[x]?delete favs[x]:favs[x]={e:it.e,n:it.n,c:it.c,q:it.q||1};localStorage["favs_"+user.uid]=JSON.stringify(favs);toast(favs[x]?"즐겨찾기에 저장했어요":"즐겨찾기를 해제했어요");render()}else if(b.dataset.act==="del"){await remove(ref(db,P(it.id)));toast("삭제했어요")}else{await update(ref(db,P(it.id)),{d:!it.d});toast(it.d?"다시 담았어요":"완료했어요")}}});
document.addEventListener("submit",async e=>{if(e.target.id!=="form")return;e.preventDefault();let n=$("#name").value.trim();if(!n)return;if(await add({e:cur.e,n,c:cur.c,q:cur.q,m:$("#memo").value.trim()}))closeM()});
document.addEventListener("input",e=>{if(e.target.id==="name")$("#save").disabled=!e.target.value.trim()});
addEventListener("offline",()=>toast("인터넷 연결을 확인해주세요"));
</script></body></html>
